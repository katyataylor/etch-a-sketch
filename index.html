<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch-a-Sketch</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Etch-a-Sketch</h1>

    <button id="reset">Clear Sketch</button>

    <!-- X & Y Inputs -->
    <div class="inputs-container">
        <input type="range" id="x-axis" min="1" max="1535" step="0.1" value="768">
        <input type="range" id="y-axis" min="1" max="1535" step="0.1" value="768">
    </div>

    <!-- Sketch Grid -->
    <div class="sketch-container">
        <!-- Border Box -->
        <div id="border-box">
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
        </div>

        <!-- Moving Point -->
         <div id="point"></div>
    </div>
    
</body>
</html>
